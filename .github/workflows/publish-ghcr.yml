name: Publish GHCR image

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: cli-proxy-api

jobs:
  docker_arch:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate build metadata
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "VERSION=dev-${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          fi
          echo "COMMIT=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
          echo "IMAGE_OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_OWNER_LC }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=-${{ matrix.arch }},onlatest=true
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  docker_manifest:
    runs-on: ubuntu-latest
    needs:
      - docker_arch
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifests
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          image_owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${image_owner_lc}/${IMAGE_NAME}"
          short_sha="${GITHUB_SHA::7}"

          docker buildx imagetools create \
            --tag "${image}:sha-${short_sha}" \
            "${image}:sha-${short_sha}-amd64" \
            "${image}:sha-${short_sha}-arm64"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            docker buildx imagetools create \
              --tag "${image}:${GITHUB_REF_NAME}" \
              "${image}:${GITHUB_REF_NAME}-amd64" \
              "${image}:${GITHUB_REF_NAME}-arm64"
          fi

          if [[ "${GITHUB_REF_TYPE}" == "branch" ]]; then
            docker buildx imagetools create \
              --tag "${image}:${GITHUB_REF_NAME}" \
              "${image}:${GITHUB_REF_NAME}-amd64" \
              "${image}:${GITHUB_REF_NAME}-arm64"
          fi

          if [[ "${GITHUB_REF_NAME}" == "${DEFAULT_BRANCH}" ]]; then
            docker buildx imagetools create \
              --tag "${image}:latest" \
              "${image}:latest-amd64" \
              "${image}:latest-arm64"
          fi
